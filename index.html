<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Meme Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <header>
    <h1>Meme Generator</h1>
    <button id="toggleTheme">🌙 Dark Mode</button>
  </header>

  <main>
    <section class="preview-section card">
      <h2>Live Preview</h2>
      <div id="meme-container">
        <canvas id="meme-canvas"></canvas>
        <div id="top-text" class="draggable">TOP TEXT</div>
        <div id="bottom-text" class="draggable">BOTTOM TEXT</div>
      </div>
    </section>

    <section class="controls-section card">
      <h2>Controls</h2>

      <label>Upload Image:
        <input type="file" id="image-upload" accept="image/*">
      </label>

      <label>Select Template:
        <select id="template-select">
          <option value="">-- Choose a Template --</option>
        </select>
      </label>

      <div id="template-preview"></div>

      <label>Top Text:
        <input type="text" id="input-top-text" placeholder="Top Text">
      </label>

      <label>Bottom Text:
        <input type="text" id="input-bottom-text" placeholder="Bottom Text">
      </label>

      <div class="font-controls">
        <label>Font Size:
          <input type="number" id="font-size" value="40">
        </label>

        <label>Font Color:
          <input type="color" id="font-color" value="#ffffff">
        </label>

        <label>Font Style:
          <select id="font-style">
            <option value="Impact">Impact</option>
            <option value="Arial">Arial</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
            <option value="Tahoma">Tahoma</option>
          </select>
        </label>
      </div>

      <div class="buttons">
        <button id="generate-btn">Generate Meme</button>
        <button id="download-btn">Download Meme</button>
        <button id="random-btn">Random Meme Template</button>
      </div>
    </section>
  </main>

  <footer>
    <p>Created by <a href="https://github.com/Dhayalan04">Dhayalan B</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
